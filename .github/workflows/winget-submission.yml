name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal2009/winget-releaser@latest
        with:
          identifier: rcmaehl.MSEdgeRedirect
          token: ${{ secrets.MSEdgeRedirect_PAT }}
